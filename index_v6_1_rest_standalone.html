ject.entries(recs()).map(([id,r])=>({id,user_id:s.user.id,date:r.date,day:r.day,exercise_id:r.exerciseId,exercise_name:r.exerciseName,sets:normSets(r.sets).map(x=>({weight:x.weight||'',reps:x.reps||'',rir:x.rir||'',restSec:x.restSec||''})),target_feeling:r.targetFeeling||'',compensation:r.compensation||'',pain:r.pain||'無',note:r.note||'',volume:r.volume||vol(r.sets),updated_at:r.updatedAt||new Date().toISOString()}))}function cycleRows(){let s=session();return cycles().map(c=>({user_id:s.user.id,week:String(c.week),data:c,updated_at:c.updatedAt||new Date().toISOString()}))}async function syncUp(){try{let wr=workoutRows(),cr=cycleRows();if(wr.length)await rest('/workout_records?on_conflict=user_id,id',{method:'POST',headers:{Prefer:'resolution=merge-duplicates'},body:JSON.stringify(wr)});if(cr.length)await rest('/cycle_entries?on_conflict=user_id,week',{method:'POST',headers:{Prefer:'resolution=merge-duplicates'},body:JSON.stringify(cr)});cloudMsg(`上傳完成：${wr.length} 筆訓練紀錄、${cr.length} 筆週期紀錄。`)}catch(e){cloudMsg('上傳失敗：'+e.message)}}async function pullDown(){try{if(!confirm('這會用雲端資料覆蓋本機 localStorage，建議先匯出 JSON。確定繼續？'))return;let wr=await rest('/workout_records?select=*');let cr=await rest('/cycle_entries?select=*');let R={};wr.forEach(x=>{R[x.id]={date:x.date,day:x.day,exerciseId:x.exercise_id,exerciseName:x.exercise_name,sets:normSets(x.sets).map(s=>({weight:s.weight||'',reps:s.reps||'',rir:s.rir||'',restSec:s.restSec||''})),targetFeeling:x.target_feeling||'',compensation:x.compensation||'',pain:x.pain||'無',note:x.note||'',volume:Number(x.volume||0),updatedAt:x.updated_at}});setRecs(R);setCycles(cr.map(x=>x.data));renderToday();renderHist();renderCycle();cloudMsg(`下載完成：${wr.length} 筆訓練紀錄、${cr.length} 筆週期紀錄。`)}catch(e){cloudMsg('下載失敗：'+e.message)}}
function switchSec(id){state.sec=id;saveUI();document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===id));document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.s===id));if(id==='cloud')loadCloudConfig()}function saveUI(){W(K.ui,state)}function loadUI(){let u=S(K.ui,null);if(u)state={...state,...u}}function init(){loadUI();if(!APP_DATA.dayOrder.includes(state.day))state.day=APP_DATA.dayOrder[0];$('date').value=today();$('hday').innerHTML=['全部',...APP_DATA.dayOrder].map(d=>`<option>${esc(d)}</option>`).join('');renderToday();renderLib();renderHist();renderCycle();$('date').addEventListener('change',()=>{openSet.clear();renderToday()});$('search').addEventListener('input',renderLib);$('hdate').addEventListener('change',renderHist);$('hday').addEventListener('change',renderHist);document.querySelectorAll('.nav button').forEach(b=>b.addEventListener('click',()=>switchSec(b.dataset.s)));switchSec(state.sec||'today');loadCloudConfig();if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}))}}try{init()}catch(e){document.body.insertAdjacentHTML('afterbegin',`<pre style="color:#fecaca;background:#111827;padding:12px">啟動錯誤：${esc(e.message)}</pre>`);console.error(e)}
