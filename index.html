<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"><meta name="theme-color" content="#111827"><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="icon-192.png"><title>訓練紀錄 App v6.1</title><link rel="stylesheet" href="style.css"></head><body><div id="app"><header class="top"><h1>訓練紀錄 App</h1><div class="sub">v6.1・組間休息・Supabase 手動同步</div></header><main class="content"><section id="today" class="section active"><div class="card"><label>日期</label><input id="date" type="date"><div class="divider"></div><label>今天訓練日</label><div id="days" class="chips"></div><div class="progress"><div class="row between"><span class="muted">完成進度</span><span id="pt" class="tag">0/0</span></div><div class="bar"><div id="pf" class="fill"></div></div></div></div><div class="summary"><div class="box"><span class="muted">動作</span><b id="se">0</b></div><div class="box"><span class="muted">完成</span><b id="sc">0</b></div><div class="box"><span class="muted">總量</span><b id="sv">0</b></div></div><div id="todayList"></div><div class="sticky"><div class="card"><div class="row"><button class="primary col" onclick="saveAll()">儲存今天整頁</button><button class="soft col" onclick="renderToday()">重新載入</button></div></div></div></section><section id="lib" class="section"><div class="card"><label>搜尋動作 / 肌群</label><input id="search" placeholder="例如：深蹲、闊背、胸推"><div id="libDays" class="chips mt"></div></div><div id="libList"></div></section><section id="hist" class="section"><div class="card"><div class="row wrap"><div class="col"><label>日期</label><input id="hdate" type="date"></div><div class="col"><label>訓練日</label><select id="hday"></select></div></div><div class="divider"></div><div class="row wrap"><button class="soft col" onclick="exportCSV()">匯出 CSV</button><button class="soft col" onclick="exportJSON()">匯出 JSON</button><label class="import col">匯入 JSON<input type="file" id="importFile" accept=".json,application/json" onchange="importJSON(event)"></label></div></div><div id="histList"></div></section><section id="cycle" class="section"><div class="card"><b>週期追蹤</b><div class="grid2"><input id="cw" inputmode="numeric" pattern="[0-9]*" placeholder="週次"><input id="cs" type="date"><input id="cwt" inputmode="decimal" placeholder="體重平均"><input id="cr" inputmode="numeric" pattern="[0-9]*" placeholder="恢復1-5"><input id="csh" placeholder="肩推"><input id="cch" placeholder="胸推"><input id="cdl" placeholder="硬舉/RDL"><input id="csq" placeholder="深蹲"></div><textarea id="cn" placeholder="備註"></textarea><div class="row mt"><button class="primary col" onclick="saveCycle()">新增 / 更新</button><button class="soft col" onclick="clearCycleForm()">清空</button></div></div><div id="cycleList"></div></section><section id="cloud" class="section"><div class="card"><b>Supabase 雲端同步</b><div class="inline mt">此版不需重建 SQL。組間休息會存入 workout_records.sets JSONB 的 restSec 欄位。</div><div class="grid2"><input id="sbUrl" placeholder="Supabase Project URL"><input id="sbAnon" placeholder="Supabase anon public key"><input id="sbEmail" placeholder="Email"><input id="sbPass" type="password" placeholder="Password"></div><div class="row wrap mt"><button class="soft col" onclick="saveCloudConfig()">儲存設定</button><button class="soft col" onclick="signUp()">註冊</button><button class="primary col" onclick="signIn()">登入</button><button class="danger col" onclick="signOut()">登出</button></div><div class="divider"></div><div class="row wrap"><button class="primary col" onclick="syncUp()">上傳本機到雲端</button><button class="soft col" onclick="pullDown()">從雲端載入並覆蓋本機</button></div><div id="cloudStatus" class="cloud-status">尚未登入。</div></div></section></main><nav class="nav"><button class="active" data-s="today">🏋️<span>今日</span></button><button data-s="lib">📚<span>動作</span></button><button data-s="hist">🗂️<span>歷史</span></button><button data-s="cycle">📈<span>週期</span></button><button data-s="cloud">☁️<span>雲端</span></button></nav></div><script id="data" type="application/json">{"plans": {"Push 推力日": [{"id": "push-1", "sort": 1, "day": "Push 推力日", "name": "機械寬肩推", "recommendedSets": "4", "recommendedReps": "6–10", "rest": "2–3 分鐘", "targetMuscles": "三角肌前束、三角肌中束、肱三頭、上胸少量", "tips": "肩膀優先主動作。肩胛穩定，不聳肩；推起時手肘路徑穩定。寬肩推與窄肩推擇一或輪替。", "alternatives": "機械窄肩推、啞鈴肩推", "defaultSets": 4}, {"id": "push-2", "sort": 2, "day": "Push 推力日", "name": "坐姿器械飛鳥／側平舉", "recommendedSets": "4", "recommendedReps": "12–20", "rest": "60–90 秒", "targetMuscles": "三角肌中束", "tips": "肩寬主力動作。重量不要過重；酸感應在肩外側，不是脖子。", "alternatives": "啞鈴側平舉、滑輪側平舉", "defaultSets": 4}, {"id": "push-3", "sort": 3, "day": "Push 推力日", "name": "站姿器械飛鳥／側平舉", "recommendedSets": "2–3", "recommendedReps": "12–20", "rest": "60–90 秒", "targetMuscles": "三角肌中束", "tips": "補充中束泵感與控制。避免借力、聳肩、甩動。", "alternatives": "單手滑輪側平舉、坐姿側平舉", "defaultSets": 3}, {"id": "push-4", "sort": 4, "day": "Push 推力日", "name": "啞鈴平板胸推", "recommendedSets": "3–4", "recommendedReps": "6–10", "rest": "2–3 分鐘", "targetMuscles": "中胸、胸大肌整體、前三角、肱三頭、肩胛穩定", "tips": "肩胛後收下壓；手肘約45–60度；下放有胸部拉伸，不讓肩膀往前跑。", "alternatives": "槓鈴臥推、機械中胸胸推", "defaultSets": 4}, {"id": "push-5", "sort": 5, "day": "Push 推力日", "name": "器械上胸胸推", "recommendedSets": "3", "recommendedReps": "8–12", "rest": "90–120 秒", "targetMuscles": "上胸、前三角、肱三頭", "tips": "角度不要太高，避免變肩推；推的方向略斜上。", "alternatives": "上斜啞鈴胸推、上斜槓鈴臥推", "defaultSets": 3}, {"id": "push-6", "sort": 6, "day": "Push 推力日", "name": "蝴蝶機夾胸", "recommendedSets": "2–3", "recommendedReps": "12–15", "rest": "60–90 秒", "targetMuscles": "胸大肌水平內收、中胸收縮感", "tips": "收尾動作。手肘微彎固定；感覺胸往中間夾，不是用手臂推。", "alternatives": "滑輪夾胸、站姿夾下胸", "defaultSets": 3}, {"id": "push-7", "sort": 7, "day": "Push 推力日", "name": "Cable 三頭下壓（選配）", "recommendedSets": "2–3", "recommendedReps": "10–15", "rest": "60–90 秒", "targetMuscles": "肱三頭肌", "tips": "若前面推類已讓三頭很疲勞可省略。手肘固定，避免肩膀代償。", "alternatives": "繩索三頭下壓、坐姿三頭下壓", "defaultSets": 3}], "Pull 拉力日": [{"id": "pull-1", "sort": 1, "day": "Pull 拉力日", "name": "傳統硬舉 或 羅馬尼亞硬舉", "recommendedSets": "3–4 / 3", "recommendedReps": "3–5 / 6–10", "rest": "2–3 分鐘", "targetMuscles": "臀大肌、腿後側、豎脊肌穩定、上背、握力", "tips": "傳統硬舉低次數高品質；RDL重點是髖鉸鏈與腿後側拉伸。豎脊肌可酸，但不能用下背硬拉。", "alternatives": "六角槓硬舉、臀推、背伸", "defaultSets": 4}, {"id": "pull-2", "sort": 2, "day": "Pull 拉力日", "name": "正握滑輪高位下拉", "recommendedSets": "4", "recommendedReps": "8–12", "rest": "90–120 秒", "targetMuscles": "闊背肌、大圓肌、下斜方肌、肱二頭輔助", "tips": "肩膀先下沉；手肘往下、往身體兩側拉；避免聳肩與二頭代償。", "alternatives": "中立握高位下拉、輔助引體", "defaultSets": 4}, {"id": "pull-3", "sort": 3, "day": "Pull 拉力日", "name": "坐姿正握水平拉（中握）", "recommendedSets": "3–4", "recommendedReps": "8–12", "rest": "90–120 秒", "targetMuscles": "中背、菱形肌、中斜方肌、闊背部分", "tips": "胸口穩定；手肘往後帶；肩胛後收但不要聳肩或後仰代償。", "alternatives": "胸靠划船、器械水平拉", "defaultSets": 4}, {"id": "pull-4", "sort": 4, "day": "Pull 拉力日", "name": "坐姿窄握／貼身水平拉", "recommendedSets": "3", "recommendedReps": "10–12", "rest": "90 秒", "targetMuscles": "闊背肌、大圓肌、側背", "tips": "手肘貼身，往褲子口袋後方拉；不要變成二頭彎舉。", "alternatives": "單臂啞鈴划船、低位滑輪划船", "defaultSets": 3}, {"id": "pull-5", "sort": 5, "day": "Pull 拉力日", "name": "蝴蝶機反向飛鳥", "recommendedSets": "3", "recommendedReps": "12–20", "rest": "60–90 秒", "targetMuscles": "後三角、上背、中斜方、菱形肌", "tips": "重量不必重；不要聳肩、不要甩；感覺在後肩與肩胛外側。", "alternatives": "面拉、俯身啞鈴反向飛鳥", "defaultSets": 3}, {"id": "pull-6", "sort": 6, "day": "Pull 拉力日", "name": "W槓二頭彎舉（寬握）", "recommendedSets": "3", "recommendedReps": "8–12", "rest": "60–90 秒", "targetMuscles": "肱二頭肌，偏短頭感受", "tips": "上臂穩定，避免身體晃動；手腕中立。", "alternatives": "機械二頭彎舉、啞鈴彎舉", "defaultSets": 3}, {"id": "pull-7", "sort": 7, "day": "Pull 拉力日", "name": "W槓二頭彎舉（窄握）", "recommendedSets": "2–3", "recommendedReps": "10–12", "rest": "60–90 秒", "targetMuscles": "肱二頭肌，偏長頭與前臂參與", "tips": "寬窄握總量控制在5–6組，不需各做過多。", "alternatives": "槌式彎舉、繩索彎舉", "defaultSets": 3}], "Legs 腿日": [{"id": "legs-1", "sort": 1, "day": "Legs 腿日", "name": "槓鈴深蹲", "recommendedSets": "4", "recommendedReps": "5–8", "rest": "2–3 分鐘", "targetMuscles": "股四頭、臀大肌、內收肌、核心、豎脊肌穩定", "tips": "腳掌穩定；膝蓋跟腳尖方向一致；核心撐住；不要為了重量犧牲深度與穩定。", "alternatives": "史密斯深蹲、高腳杯深蹲、腿推", "defaultSets": 4}, {"id": "legs-2", "sort": 2, "day": "Legs 腿日", "name": "臀推 或 保加利亞分腿蹲", "recommendedSets": "3", "recommendedReps": "8–12", "rest": "90–120 秒", "targetMuscles": "臀大肌；保加利亞另含股四頭、臀中肌穩定", "tips": "臀推頂端夾臀但不拱腰；保加利亞注意膝蓋軌跡與骨盆穩定。", "alternatives": "啞鈴弓箭步、45度背伸臀主導", "defaultSets": 3}, {"id": "legs-3", "sort": 3, "day": "Legs 腿日", "name": "坐姿前踢", "recommendedSets": "3", "recommendedReps": "10–15", "rest": "60–90 秒", "targetMuscles": "股四頭肌", "tips": "頂端可停一下；不要甩；膝蓋不適時降低重量。", "alternatives": "腿推、哈克深蹲", "defaultSets": 3}, {"id": "legs-4", "sort": 4, "day": "Legs 腿日", "name": "坐姿下勾", "recommendedSets": "3", "recommendedReps": "10–15", "rest": "60–90 秒", "targetMuscles": "腿後肌群，膝屈曲", "tips": "控制離心；感覺大腿後側收縮，不要用身體晃動。", "alternatives": "臥姿腿後勾、滑輪腿後勾", "defaultSets": 3}, {"id": "legs-5", "sort": 5, "day": "Legs 腿日", "name": "站姿小腿", "recommendedSets": "4", "recommendedReps": "10–20", "rest": "60–90 秒", "targetMuscles": "腓腸肌、小腿整體", "tips": "底部拉伸、頂端停一下；不要彈震。", "alternatives": "坐姿小腿、腿推機提踵", "defaultSets": 4}, {"id": "legs-6", "sort": 6, "day": "Legs 腿日", "name": "坐姿外張", "recommendedSets": "2–3", "recommendedReps": "12–20", "rest": "60–90 秒", "targetMuscles": "臀中肌、臀小肌、髖穩定", "tips": "控制外展，避免身體晃動；可幫助深蹲膝蓋控制。", "alternatives": "彈力帶側走、蚌式開合", "defaultSets": 3}, {"id": "legs-7", "sort": 7, "day": "Legs 腿日", "name": "坐姿內夾", "recommendedSets": "2–3", "recommendedReps": "12–20", "rest": "60–90 秒", "targetMuscles": "內收肌群、大腿內側", "tips": "動作控制，不需過重；補足深蹲底部穩定。", "alternatives": "側弓箭步、相撲深蹲", "defaultSets": 3}, {"id": "legs-8", "sort": 8, "day": "Legs 腿日", "name": "坐姿捲腹 或 Pallof Press", "recommendedSets": "3–5 / 3", "recommendedReps": "10–15 / 每側10–12", "rest": "45–90 秒", "targetMuscles": "腹直肌／抗旋轉核心、軀幹穩定", "tips": "不要只練捲腹；可與Pallof Press、死蟲、側棒式輪替。", "alternatives": "死蟲、棒式、側棒式", "defaultSets": 5}]}, "dayOrder": ["Push 推力日", "Pull 拉力日", "Legs 腿日"], "painOptions": ["無", "輕微", "明顯", "刺痛/麻/放射痛"]}</script><script src="app.js"></script></body></ht
